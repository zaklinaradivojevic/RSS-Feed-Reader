<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontpage - RSS Aggregator with OPML Import</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    :root {
      --color-accent: #2563eb;
      --color-accent-subtle: #eff6ff;
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f8fafc;
      --color-bg-tertiary: #f1f5f9;
      --color-surface: #ffffff;
      --color-border: #e2e8f0;
      --color-text-primary: #0f172a;
      --color-text-secondary: #475569;
      --color-text-tertiary: #94a3b8;
      --color-success: #10b981;
      --color-error: #ef4444;
      --color-warning: #f59e0b;
      --spacing-sidebar: 280px;
      --container-feed: 800px;
    }
    
    .bg-accent { background: var(--color-accent); }
    .bg-accent-subtle { background: var(--color-accent-subtle); }
    .bg-bg-primary { background: var(--color-bg-primary); }
    .bg-bg-secondary { background: var(--color-bg-secondary); }
    .bg-bg-tertiary { background: var(--color-bg-tertiary); }
    .text-accent { color: var(--color-accent); }
    .text-text-primary { color: var(--color-text-primary); }
    .text-text-secondary { color: var(--color-text-secondary); }
    .text-text-tertiary { color: var(--color-text-tertiary); }
    .border-border { border-color: var(--color-border); }
    
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .transition-colors { transition: all 0.2s ease; }
    .sidebar-width { width: var(--spacing-sidebar); }
    .max-w-feed { max-width: var(--container-feed); }
    
    /* Modal animacija */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: white;
      border-radius: 0.5rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
  </style>
</head>
<body class="bg-bg-primary text-text-primary font-sans antialiased h-full flex flex-col overflow-hidden">

  <!-- Top Navbar -->
  <header class="h-14 border-b border-border px-4 flex items-center justify-between bg-surface shrink-0">
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-2 font-bold text-lg">
        <div class="w-6 h-6 bg-accent rounded-md flex items-center justify-center text-white text-xs font-bold">F</div>
        <span>Frontpage</span>
      </div>
      <nav class="flex gap-1">
        <a href="#" class="px-3 py-1.5 bg-bg-tertiary text-text-primary rounded-md text-sm no-underline">Feed</a>
        <a href="#" class="px-3 py-1.5 text-text-secondary hover:text-text-primary rounded-md text-sm no-underline">Digest</a>
        <a href="#" class="px-3 py-1.5 text-text-secondary hover:text-text-primary rounded-md text-sm no-underline">Discover</a>
      </nav>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative w-64">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-text-tertiary text-xs">🔍</span>
        <input type="text" id="searchInput" placeholder="Search..." class="w-full bg-bg-secondary border border-border rounded-md pl-8 pr-3 py-1 text-sm focus:outline-none focus:border-accent">
      </div>
      <button id="importOpmlBtn" class="px-3 py-1.5 text-sm bg-bg-secondary border border-border rounded-md hover:bg-bg-tertiary transition-colors">
        📁 Import OPML
      </button>
      <button id="exportOpmlBtn" class="px-3 py-1.5 text-sm bg-bg-secondary border border-border rounded-md hover:bg-bg-tertiary transition-colors">
        📤 Export OPML
      </button>
      <div class="w-8 h-8 rounded-full bg-bg-tertiary border border-border flex items-center justify-center text-sm">👤</div>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden">
    <!-- Sidebar -->
    <aside class="sidebar-width bg-bg-secondary border-r border-border flex flex-col p-3 overflow-y-auto shrink-0">
      <div class="flex-1">
        <div class="mb-6">
          <div class="flex justify-between items-center px-3 py-2 bg-accent-subtle text-accent rounded-md mb-1 cursor-pointer" data-filter="all">
            <span>📰 All Items</span>
            <span class="text-xs bg-accent/10 text-accent px-1.5 py-0.5 rounded" id="totalCount">0</span>
          </div>
          <div class="flex justify-between items-center px-3 py-2 text-text-secondary hover:bg-bg-tertiary rounded-md cursor-pointer" data-filter="saved">
            <span>🔖 Saved</span>
            <span class="text-xs" id="savedCount">0</span>
          </div>
        </div>
        
        <div>
          <div class="text-xs font-bold text-text-tertiary uppercase px-3 mb-2">Categories</div>
          <div id="categoryList" class="space-y-1"></div>
        </div>
        
        <div class="mt-6">
          <div class="text-xs font-bold text-text-tertiary uppercase px-3 mb-2">Feeds</div>
          <div id="feedList" class="space-y-1 max-h-96 overflow-y-auto"></div>
        </div>
      </div>
      <div class="border-t border-border pt-3 px-3 flex items-center gap-2 text-xs text-success">
        <span>✅</span>
        <span id="feedCountStatus">0 feeds</span>
      </div>
    </aside>

    <!-- Main Feed -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <div class="px-6 py-3 border-b border-border flex justify-between items-center bg-surface shrink-0">
        <div>
          <h1 class="text-lg font-semibold inline" id="feedTitle">All Items</h1>
          <span class="text-xs text-text-tertiary ml-2" id="unreadCount">0 unread</span>
        </div>
        <button id="markAllRead" class="px-3 py-1.5 text-sm bg-bg-secondary border border-border rounded-md hover:bg-bg-tertiary">✓ Mark all as read</button>
      </div>
      
      <div id="feedStream" class="flex-1 overflow-y-auto p-6">
        <div class="max-w-feed mx-auto text-center py-12">
          <div class="text-4xl mb-3">📡</div>
          <h3 class="text-lg font-semibold mb-2">No feeds yet</h3>
          <p class="text-text-secondary text-sm mb-4">Import OPML file to get started</p>
          <button id="importEmptyBtn" class="px-4 py-2 bg-accent text-white rounded-md hover:bg-accent/90">📁 Import OPML</button>
        </div>
      </div>
    </main>
  </div>

  <!-- OPML Import Modal -->
  <div id="opmlModal" class="modal">
    <div class="modal-content p-6">
      <h3 class="text-lg font-semibold mb-4">Import OPML</h3>
      <p class="text-sm text-text-secondary mb-4">Upload your OPML file or paste OPML content</p>
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Upload file:</label>
        <input type="file" id="opmlFile" accept=".opml,.xml" class="w-full text-sm">
      </div>
      
      <div class="mb-4">
        <label class="block text-sm font-medium mb-2">Or paste OPML content:</label>
        <textarea id="opmlContent" rows="6" class="w-full px-3 py-2 border border-border rounded-md text-sm font-mono" placeholder='<?xml version="1.0"?><opml version="2.0">...'></textarea>
      </div>
      
      <div id="importPreview" class="mb-4 hidden">
        <div class="text-sm font-medium mb-2">Preview:</div>
        <div id="previewList" class="max-h-40 overflow-y-auto text-sm space-y-1"></div>
      </div>
      
      <div class="flex gap-2 justify-end">
        <button id="closeModal" class="px-4 py-2 border border-border rounded-md hover:bg-bg-tertiary">Cancel</button>
        <button id="confirmImport" class="px-4 py-2 bg-accent text-white rounded-md hover:bg-accent/90">Import</button>
      </div>
    </div>
  </div>

  <script>
    // CORS proxy
    const CORS_PROXY = 'https://api.allorigins.win/raw?url=';
    
    // Storage keys
    const STORAGE_FEEDS = 'frontpage_feeds';
    const STORAGE_ARTICLES = 'frontpage_articles';
    const STORAGE_READ = 'frontpage_read';
    const STORAGE_SAVED = 'frontpage_saved';
    
    // App state
    let userFeeds = [];  // { id, title, feedUrl, siteUrl, category, icon }
    let allArticles = [];
    let readArticles = new Set();
    let savedArticles = new Set();
    let currentFilter = 'all';
    let currentCategory = null;
    let searchQuery = '';
    
    // Default feeds (iz sample-feeds.opml)
    const DEFAULT_FEEDS = [
      { id: '1', title: 'CSS-Tricks', feedUrl: 'https://css-tricks.com/feed/', category: 'Frontend', icon: '🎨' },
      { id: '2', title: 'Smashing Magazine', feedUrl: 'https://www.smashingmagazine.com/feed/', category: 'Frontend', icon: '🔥' },
      { id: '3', title: 'Josh W. Comeau', feedUrl: 'https://www.joshwcomeau.com/rss.xml', category: 'Frontend', icon: '💙' },
      { id: '4', title: 'Kent C. Dodds', feedUrl: 'https://kentcdodds.com/blog/rss.xml', category: 'Frontend', icon: '💿' },
      { id: '5', title: 'web.dev', feedUrl: 'https://web.dev/feed.xml', category: 'Frontend', icon: '🌐' },
      { id: '6', title: 'MDN Blog', feedUrl: 'https://developer.mozilla.org/en-US/blog/rss.xml', category: 'Frontend', icon: '📘' },
      { id: '7', title: 'Sidebar.io', feedUrl: 'https://sidebar.io/feed.xml', category: 'Design', icon: '📐' },
      { id: '8', title: 'Nielsen Norman Group', feedUrl: 'https://www.nngroup.com/feed/rss/', category: 'Design', icon: '🔍' },
      { id: '9', title: 'Figma Blog', feedUrl: 'https://www.figma.com/blog/feed/', category: 'Design', icon: '🎨' },
      { id: '10', title: 'A List Apart', feedUrl: 'https://alistapart.com/main/feed/', category: 'Design', icon: '📝' },
      { id: '11', title: 'UX Collective', feedUrl: 'https://uxdesign.cc/feed', category: 'Design', icon: '💡' },
      { id: '12', title: 'Cloudflare Blog', feedUrl: 'https://blog.cloudflare.com/rss/', category: 'Backend & DevOps', icon: '☁️' },
      { id: '13', title: 'Vercel Blog', feedUrl: 'https://vercel.com/atom', category: 'Backend & DevOps', icon: '▲' },
      { id: '14', title: 'The GitHub Blog', feedUrl: 'https://github.blog/feed/', category: 'Backend & DevOps', icon: '🐙' },
      { id: '15', title: 'Netlify Blog', feedUrl: 'https://www.netlify.com/blog/index.xml', category: 'Backend & DevOps', icon: '⚡' },
      { id: '16', title: 'The Pragmatic Engineer', feedUrl: 'https://blog.pragmaticengineer.com/rss/', category: 'General Tech', icon: '🔧' },
      { id: '17', title: 'Hacker News Best', feedUrl: 'https://hnrss.org/best', category: 'General Tech', icon: '📰' },
      { id: '18', title: 'Simon Willison', feedUrl: 'https://simonwillison.net/atom/everything/', category: 'AI & ML', icon: '🤖' },
      { id: '19', title: 'Hugging Face Blog', feedUrl: 'https://huggingface.co/blog/feed.xml', category: 'AI & ML', icon: '🤗' }
    ];
    
    // Učitaj stanje
    function loadState() {
      const savedFeeds = localStorage.getItem(STORAGE_FEEDS);
      if (savedFeeds) {
        userFeeds = JSON.parse(savedFeeds);
      } else {
        userFeeds = DEFAULT_FEEDS;
        saveFeeds();
      }
      
      const savedArticles = localStorage.getItem(STORAGE_ARTICLES);
      if (savedArticles) {
        allArticles = JSON.parse(savedArticles);
      }
      
      const read = localStorage.getItem(STORAGE_READ);
      if (read) readArticles = new Set(JSON.parse(read));
      
      const saved = localStorage.getItem(STORAGE_SAVED);
      if (saved) savedArticles = new Set(JSON.parse(saved));
    }
    
    function saveFeeds() {
      localStorage.setItem(STORAGE_FEEDS, JSON.stringify(userFeeds));
    }
    
    function saveArticles() {
      localStorage.setItem(STORAGE_ARTICLES, JSON.stringify(allArticles));
      localStorage.setItem(STORAGE_READ, JSON.stringify(Array.from(readArticles)));
      localStorage.setItem(STORAGE_SAVED, JSON.stringify(Array.from(savedArticles)));
    }
    
    // Parsiraj RSS/Atom feed
    async function fetchFeed(feed) {
      try {
        const response = await fetch(CORS_PROXY + encodeURIComponent(feed.feedUrl));
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const text = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/xml');
        
        const isAtom = doc.querySelector('feed') !== null;
        const items = [];
        
        if (isAtom) {
          const entries = doc.querySelectorAll('entry');
          entries.forEach((entry, idx) => {
            const title = entry.querySelector('title')?.textContent || 'No title';
            const link = entry.querySelector('link')?.getAttribute('href') || '#';
            const summary = entry.querySelector('summary')?.textContent || '';
            const content = entry.querySelector('content')?.textContent || summary;
            const published = entry.querySelector('published')?.textContent || entry.querySelector('updated')?.textContent;
            
            items.push({
              id: `${feed.id}-${idx}`,
              title: decodeHTMLEntities(title),
              content: decodeHTMLEntities((content || summary).substring(0, 300)),
              link: link,
              source: feed.title,
              sourceIcon: feed.icon,
              category: feed.category,
              published: published ? new Date(published) : new Date(),
              timestamp: published ? new Date(published).getTime() : Date.now(),
              feedId: feed.id
            });
          });
        } else {
          const channel = doc.querySelector('channel');
          if (channel) {
            const itemsList = channel.querySelectorAll('item');
            itemsList.forEach((item, idx) => {
              const title = item.querySelector('title')?.textContent || 'No title';
              const link = item.querySelector('link')?.textContent || '#';
              const description = item.querySelector('description')?.textContent || '';
              const contentEncoded = item.querySelector('content\\:encoded')?.textContent;
              const pubDate = item.querySelector('pubDate')?.textContent;
              
              items.push({
                id: `${feed.id}-${idx}`,
                title: decodeHTMLEntities(title),
                content: decodeHTMLEntities((contentEncoded || description).substring(0, 300)),
                link: link,
                source: feed.title,
                sourceIcon: feed.icon,
                category: feed.category,
                published: pubDate ? new Date(pubDate) : new Date(),
                timestamp: pubDate ? new Date(pubDate).getTime() : Date.now(),
                feedId: feed.id
              });
            });
          }
        }
        
        return items.slice(0, 15);
      } catch (error) {
        console.error(`Failed to fetch ${feed.title}:`, error);
        return [];
      }
    }
    
    // Učitaj sve feedove
    async function loadAllFeeds() {
      const feedStream = document.getElementById('feedStream');
      feedStream.innerHTML = `
        <div class="max-w-feed mx-auto text-center py-12">
          <div class="animate-pulse">
            <div class="text-4xl mb-3">📡</div>
            <h3 class="text-lg font-semibold mb-2">Loading ${userFeeds.length} feeds...</h3>
            <p class="text-text-secondary text-sm">Fetching real content from RSS/Atom feeds</p>
            <div class="mt-4 text-xs text-text-tertiary" id="fetchProgress">0/${userFeeds.length}</div>
          </div>
        </div>
      `;
      
      allArticles = [];
      let completed = 0;
      
      for (const feed of userFeeds) {
        const articles = await fetchFeed(feed);
        allArticles.push(...articles);
        completed++;
        const progressElem = document.getElementById('fetchProgress');
        if (progressElem) progressElem.textContent = `${completed}/${userFeeds.length}`;
      }
      
      // Dodaj read/saved status
      allArticles = allArticles.map(article => ({
        ...article,
        read: readArticles.has(article.id),
        saved: savedArticles.has(article.id)
      }));
      
      allArticles.sort((a, b) => b.timestamp - a.timestamp);
      
      saveArticles();
      renderCategories();
      renderFeedList();
      renderFeed();
    }
    
    function decodeHTMLEntities(text) {
      const textarea = document.createElement('textarea');
      textarea.innerHTML = text;
      return textarea.value;
    }
    
    // OPML Parser (handles all edge cases)
    function parseOPML(xmlText) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'text/xml');
      const feeds = [];
      const seenUrls = new Set();
      
      function processOutline(outline, parentCategory = null) {
        const type = outline.getAttribute('type');
        const xmlUrl = outline.getAttribute('xmlUrl') || outline.getAttribute('xmlurl');
        const title = outline.getAttribute('title') || outline.getAttribute('text') || '';
        
        // Ako ima xmlUrl, to je feed
        if (xmlUrl && type !== 'include') {
          // Edge case: Duplicate detection
          if (!seenUrls.has(xmlUrl)) {
            seenUrls.add(xmlUrl);
            
            // Edge case: Dead feed (example.com)
            const isDeadFeed = xmlUrl.includes('example.com') || xmlUrl.includes('this-feed-does-not-exist');
            
            feeds.push({
              id: Date.now() + Math.random(),
              title: title || (isDeadFeed ? 'Dead Feed' : 'Untitled Feed'),
              feedUrl: xmlUrl,
              siteUrl: outline.getAttribute('htmlUrl') || outline.getAttribute('htmlurl') || '',
              category: parentCategory || 'Imported',
              icon: getRandomIcon(),
              isDead: isDeadFeed
            });
          }
        }
        
        // Rekurzivno obradi decu
        const children = outline.children;
        for (let i = 0; i < children.length; i++) {
          const child = children[i];
          if (child.tagName === 'outline') {
            const categoryName = outline.getAttribute('title') || outline.getAttribute('text') || parentCategory;
            processOutline(child, categoryName);
          }
        }
      }
      
      const body = doc.querySelector('body');
      if (body) {
        const outlines = body.children;
        for (let i = 0; i < outlines.length; i++) {
          processOutline(outlines[i]);
        }
      }
      
      return feeds;
    }
    
    function getRandomIcon() {
      const icons = ['📰', '📱', '💻', '🔧', '🎨', '📐', '⚡', '🔥', '💡', '🤖', '💙', '🎯'];
      return icons[Math.floor(Math.random() * icons.length)];
    }
    
    // Render funkcije
    function renderCategories() {
      const categories = [...new Set(userFeeds.map(f => f.category))];
      const container = document.getElementById('categoryList');
      if (!container) return;
      
      container.innerHTML = categories.map(cat => `
        <div class="category-item px-3 py-1.5 rounded-md cursor-pointer hover:bg-bg-tertiary" data-category="${cat}">
          <div class="flex justify-between items-center">
            <span class="text-sm">${getCategoryIcon(cat)} ${cat}</span>
            <span class="text-xs text-text-tertiary">${userFeeds.filter(f => f.category === cat).length}</span>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.category-item').forEach(el => {
        el.addEventListener('click', () => {
          currentCategory = el.dataset.category;
          currentFilter = null;
          document.getElementById('feedTitle').textContent = currentCategory;
          renderFeed();
        });
      });
    }
    
    function renderFeedList() {
      const container = document.getElementById('feedList');
      if (!container) return;
      
      container.innerHTML = userFeeds.map(feed => `
        <div class="feed-item flex justify-between items-center px-3 py-1.5 rounded-md text-sm group">
          <span class="truncate flex-1">${feed.icon} ${feed.title}</span>
          <button class="remove-feed text-text-tertiary hover:text-error opacity-0 group-hover:opacity-100 transition-opacity" data-id="${feed.id}">✕</button>
        </div>
      `).join('');
      
      document.querySelectorAll('.remove-feed').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          userFeeds = userFeeds.filter(f => f.id !== id);
          saveFeeds();
          loadAllFeeds();
        });
      });
      
      document.getElementById('feedCountStatus').textContent = `${userFeeds.length} feeds`;
    }
    
    function getCategoryIcon(category) {
      const icons = {
        'Frontend': '💙',
        'Design': '🎨',
        'Backend & DevOps': '⚙️',
        'General Tech': '💻',
        'AI & ML': '🧠'
      };
      return icons[category] || '📁';
    }
    
    function getFilteredArticles() {
      let filtered = [...allArticles];
      
      if (currentFilter === 'saved') {
        filtered = filtered.filter(a => a.saved);
      } else if (currentCategory) {
        filtered = filtered.filter(a => a.category === currentCategory);
      }
      
      if (searchQuery) {
        const query = searchQuery.toLowerCase();
        filtered = filtered.filter(a => 
          a.title.toLowerCase().includes(query) || 
          a.source.toLowerCase().includes(query)
        );
      }
      
      return filtered;
    }
    
    function renderFeed() {
      const filtered = getFilteredArticles();
      const container = document.getElementById('feedStream');
      const unreadCount = filtered.filter(a => !a.read).length;
      
      document.getElementById('unreadCount').textContent = `${unreadCount} unread`;
      document.getElementById('totalCount').textContent = allArticles.length;
      document.getElementById('savedCount').textContent = allArticles.filter(a => a.saved).length;
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="max-w-feed mx-auto text-center py-12">
            <div class="text-4xl mb-3">📭</div>
            <h3 class="text-lg font-semibold mb-2">No articles found</h3>
            <p class="text-text-secondary text-sm">Try importing more feeds or check back later</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = `
        <div class="max-w-feed mx-auto space-y-6">
          ${filtered.map(article => `
            <article class="article-item relative pl-4 cursor-pointer group" data-id="${article.id}">
              <div class="absolute left-0 top-2 w-2 h-2 rounded-full ${article.read ? 'bg-gray-300' : 'bg-accent'}"></div>
              <div class="flex items-center gap-2 text-xs text-text-tertiary mb-1">
                <span class="font-medium text-text-secondary">${article.sourceIcon} ${article.source}</span>
                <span>•</span>
                <span>${formatTimeAgo(article.timestamp)}</span>
                <button class="save-btn ml-auto text-text-tertiary hover:text-accent" data-id="${article.id}">${article.saved ? '🔖' : '🏷️'}</button>
              </div>
              <h2 class="text-base font-semibold text-text-primary mb-1 group-hover:text-accent">
                ${article.title}
              </h2>
              <p class="text-sm text-text-secondary line-clamp-2">${article.content.replace(/<[^>]*>/g, '')}</p>
              <div class="mt-2">
                <span class="text-xs px-2 py-0.5 rounded ${getCategoryColor(article.category)}">${article.category}</span>
              </div>
            </article>
          `).join('')}
        </div>
      `;
      
      // Event listeners
      document.querySelectorAll('.article-item').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.classList.contains('save-btn')) return;
          const id = el.dataset.id;
          if (!readArticles.has(id)) {
            readArticles.add(id);
            const article = allArticles.find(a => a.id === id);
            if (article) article.read = true;
            saveArticles();
            renderFeed();
          }
        });
      });
      
      document.querySelectorAll('.save-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          if (savedArticles.has(id)) {
            savedArticles.delete(id);
            const article = allArticles.find(a => a.id === id);
            if (article) article.saved = false;
          } else {
            savedArticles.add(id);
            const article = allArticles.find(a => a.id === id);
            if (article) article.saved = true;
          }
          saveArticles();
          renderFeed();
        });
      });
    }
    
    function getCategoryColor(category) {
      const colors = {
        'Frontend': 'bg-blue-100 text-blue-700',
        'Design': 'bg-pink-100 text-pink-700',
        'Backend & DevOps': 'bg-green-100 text-green-700',
        'General Tech': 'bg-yellow-100 text-yellow-700',
        'AI & ML': 'bg-purple-100 text-purple-700'
      };
      return colors[category] || 'bg-gray-100 text-gray-700';
    }
    
    function formatTimeAgo(timestamp) {
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return `${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }
    
    // OPML Import handler
    async function importOPML(content) {
      const feeds = parseOPML(content);
      const validFeeds = feeds.filter(f => !f.isDead);
      const deadFeeds = feeds.filter(f => f.isDead);
      
      // Dodaj nove feedove (bez duplikata)
      const existingUrls = new Set(userFeeds.map(f => f.feedUrl));
      const newFeeds = validFeeds.filter(f => !existingUrls.has(f.feedUrl));
      
      userFeeds = [...userFeeds, ...newFeeds];
      saveFeeds();
      
      // Prikaži rezultat
      alert(`Imported ${newFeeds.length} feeds.\n${deadFeeds.length} dead feeds skipped.\n${validFeeds.length - newFeeds.length} duplicates ignored.`);
      
      if (newFeeds.length > 0) {
        await loadAllFeeds();
      }
      
      return { imported: newFeeds.length, dead: deadFeeds.length, duplicates: validFeeds.length - newFeeds.length };
    }
    
    // Export OPML
    function exportOPML() {
      let opml = `<?xml version="1.0" encoding="UTF-8"?>
<opml version="2.0">
  <head>
    <title>Frontpage Export</title>
    <dateCreated>${new Date().toISOString()}</dateCreated>
  </head>
  <body>
`;
      
      const categories = [...new Set(userFeeds.map(f => f.category))];
      categories.forEach(cat => {
        opml += `    <outline text="${cat}" title="${cat}">\n`;
        const feedsInCat = userFeeds.filter(f => f.category === cat);
        feedsInCat.forEach(feed => {
          opml += `      <outline type="rss" text="${escapeXml(feed.title)}" title="${escapeXml(feed.title)}" xmlUrl="${feed.feedUrl}" htmlUrl="${feed.siteUrl || ''}"/>\n`;
        });
        opml += `    </outline>\n`;
      });
      
      opml += `  </body>\n</opml>`;
      
      const blob = new Blob([opml], { type: 'text/xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'frontpage-export.opml';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function escapeXml(str) {
      return str.replace(/[<>&]/g, function(m) {
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '&') return '&amp;';
        return m;
      });
    }
    
    // Event listeners
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      renderFeed();
    });
    
    document.getElementById('markAllRead')?.addEventListener('click', () => {
      allArticles.forEach(article => {
        readArticles.add(article.id);
        article.read = true;
      });
      saveArticles();
      renderFeed();
    });
    
    document.querySelector('[data-filter="all"]')?.addEventListener('click', () => {
      currentFilter = 'all';
      currentCategory = null;
      document.getElementById('feedTitle').textContent = 'All Items';
      renderFeed();
    });
    
    document.querySelector('[data-filter="saved"]')?.addEventListener('click', () => {
      currentFilter = 'saved';
      currentCategory = null;
      document.getElementById('feedTitle').textContent = 'Saved Items';
      renderFeed();
    });
    
    // OPML Modal
    const modal = document.getElementById('opmlModal');
    const importBtn = document.getElementById('importOpmlBtn');
    const exportBtn = document.getElementById('exportOpmlBtn');
    const closeModal = document.getElementById('closeModal');
    const confirmImport = document.getElementById('confirmImport');
    const fileInput = document.getElementById('opmlFile');
    const textarea = document.getElementById('opmlContent');
    
    importBtn?.addEventListener('click', () => modal.classList.add('active'));
    exportBtn?.addEventListener('click', exportOPML);
    closeModal?.addEventListener('click', () => modal.classList.remove('active'));
    
    fileInput?.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          textarea.value = event.target.result;
        };
        reader.readAsText(file);
      }
    });
    
    confirmImport?.addEventListener('click', async () => {
      const content = textarea.value;
      if (content.trim()) {
        await importOPML(content);
        modal.classList.remove('active');
        textarea.value = '';
        fileInput.value = '';
      } else {
        alert('Please provide OPML content or upload a file');
      }
    });
    
    document.getElementById('importEmptyBtn')?.addEventListener('click', () => {
      modal.classList.add('active');
    });
    
    // Pokreni app
    loadState();
    renderCategories();
    renderFeedList();
    
    if (userFeeds.length > 0) {
      loadAllFeeds();
    } else {
      document.getElementById('feedStream').innerHTML = `
        <div class="max-w-feed mx-auto text-center py-12">
          <div class="text-4xl mb-3">📭</div>
          <h3 class="text-lg font-semibold mb-2">No feeds yet</h3>
          <p class="text-text-secondary text-sm mb-4">Import OPML file to get started</p>
          <button id="importEmptyBtn2" class="px-4 py-2 bg-accent text-white rounded-md hover:bg-accent/90">📁 Import OPML</button>
        </div>
      `;
      document.getElementById('importEmptyBtn2')?.addEventListener('click', () => modal.classList.add('active'));
    }
  </script>
</body>
</html>
